name: pass_tech
description: "Gestionnaire de mots de passe 100% local et sécurisé"
publish_to: 'none'
version: 1.9.0+12

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3
  encrypt: ^5.0.3
  uuid: ^4.5.1
  share_plus: ^10.0.3
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  http: ^1.2.0
  path_provider: ^2.1.4
  mobile_scanner: ^5.2.3
  file_picker: ^8.1.2
  flutter_slidable: ^3.1.1
  biometric_storage: ^5.0.1

  # Liens externes (mailto / https) + rendu Markdown pour les pages légales
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/legal/
