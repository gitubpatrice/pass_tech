name: pass_tech
description: "Gestionnaire de mots de passe 100% local et sécurisé"
publish_to: 'none'
version: 2.4.4+31

environment:
  sdk: ^3.11.5

dependencies:
  files_tech_core:
    path: ../files_tech_core
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  # v4 hardening : Argon2id + AES-GCM (Dart pur + accélération native FFI)
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2
  uuid: ^4.5.1
  share_plus: ^10.0.3
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  http: ^1.2.0
  path_provider: ^2.1.4
  mobile_scanner: ^5.2.3
  file_picker: ^11.0.0
  flutter_slidable: ^4.0.3
  biometric_storage: ^5.0.1
  # v2.3.8 — version dynamique pour app_update (anti désync pubspec/const).
  package_info_plus: ^9.0.0

  # Liens externes (mailto / https) + rendu Markdown pour les pages légales
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.1.3

  # Génération des icônes mipmap Android (5 densités + adaptive icon).
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#262660"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon.png
    - assets/legal/
