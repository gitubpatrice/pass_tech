name: Claude Review

# Review automatique des PR par Claude Code (anthropics/claude-code-action).
# Coût : ~0.10-0.50 € par review (tokens API Anthropic, paye à l'usage).
#
# Mention @claude dans une issue ou PR pour invoquer manuellement.
# Auto-review activé sur opened/synchronize.

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Skip si commentaire sans mention @claude (économie de tokens).
    if: |
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude')) ||
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # pour commit des fixes si demandé
      pull-requests: write  # pour commenter sur la PR
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Prompt pour les auto-reviews PR (skip pour @claude mentions
          # qui suivent l'instruction du commentaire).
          prompt: |
            Review this PR focusing on:
            - Security issues (OWASP Mobile Top 10)
            - Code quality, dead code, duplications
            - Logic errors, edge cases not handled
            - Performance issues (main isolate blocking, leaks)
            Keep comments concise and actionable. Use inline review comments where possible.
            Skip nitpicks. French replies preferred.
