name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Analyze + Test + Build (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout app
        uses: actions/checkout@v6
        with:
          path: pass_tech

      # Le pubspec référence files_tech_core via `path: ../files_tech_core`.
      # On le checkout en sibling pour que `flutter pub get` résolve la dep.
      - name: Checkout files_tech_core (path dependency)
        uses: actions/checkout@v6
        with:
          repository: gitubpatrice/files_tech_core
          path: files_tech_core

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        working-directory: pass_tech
        run: flutter pub get

      - name: Analyze
        working-directory: pass_tech
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: pass_tech
        run: flutter test || echo "No tests yet"

      # Build debug APK pour valider que la compilation passe end-to-end
      # (pas besoin de keystore release en CI).
      - name: Build APK (debug, unsigned)
        working-directory: pass_tech
        run: flutter build apk --debug

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pass_tech-debug-${{ github.sha }}
          path: pass_tech/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: ignore
