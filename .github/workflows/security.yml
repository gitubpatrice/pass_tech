name: Security Scan

# Scan de vulnérabilités (CVE) dans les dépendances pub + autres.
# Source : OSV.dev (Google). Complète Dependabot qui met à jour mais
# ne flag pas activement les CVE actuelles.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Re-scan hebdomadaire — nouvelles CVE découvertes rétroactivement.
    - cron: '0 6 * * 1'

jobs:
  osv-scan:
    name: OSV-Scanner (CVE check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write  # pour upload SARIF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.2.3
        with:
          scan-args: |-
            --output=osv-results.sarif
            --format=sarif
            --recursive
            ./
        continue-on-error: true

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
