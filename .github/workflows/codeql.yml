name: CodeQL

# Analyse statique de sécurité GitHub natif sur le code Kotlin Android.
# Note : Dart non supporté par CodeQL — l'analyse Dart est faite par
# `flutter analyze` dans le workflow CI principal.
#
# Détecte (côté Kotlin) : injections, path traversal, perms leak, crypto
# faible, hardcoded secrets, deserialization unsafe, race conditions,
# logs de données sensibles, etc.
#
# Findings visibles dans l'onglet Security > Code scanning du repo.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Re-scan hebdomadaire pour catcher les nouvelles règles CodeQL.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (Kotlin/Java)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['java-kotlin']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # On limite l'analyse au code Android (Kotlin/Java), pas tout le repo.
          source-root: android
          queries: security-and-quality

      # CodeQL fait un build automatique pour Kotlin via la query
      # `autobuild`. Pour Flutter Android, on contourne en pointant
      # directement sur le code source sans compiler le Dart.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
