name: CodeQL

# Analyse statique de sécurité GitHub natif sur le code Kotlin Android.
# Note : Dart non supporté par CodeQL — l'analyse Dart est faite par
# `flutter analyze` dans le workflow CI principal.
#
# `build-mode: none` : analyse statique sans compilation (Flutter Android
# nécessiterait flutter SDK + gradle, hors scope CodeQL). La couverture
# est légèrement réduite mais reste utile pour les patterns Kotlin courants
# (path traversal, hardcoded secrets, intent leaks, crypto faible).
#
# Findings visibles dans l'onglet Security > Code scanning du repo.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (Kotlin/Java, no-build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['java-kotlin']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          source-root: android
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
