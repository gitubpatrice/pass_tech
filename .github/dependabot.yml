version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dart"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "android"
    # Les bumps majeurs côté Android Gradle Plugin / Kotlin / Gradle Wrapper
    # cassent systématiquement la CI tant que Flutter ne suit pas. On les
    # ignore — on les fera à la main quand Flutter aura validé.
    ignore:
      - dependency-name: "org.jetbrains.kotlin.android"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gradle-wrapper"
        update-types: ["version-update:semver-major"]
